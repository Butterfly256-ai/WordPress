apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: nginx-rollout
  namespace: nginx-rollout
spec:
  replicas: 3
  selector:
    matchLabels:
      app: nginx-rollout
  template:
    metadata:
      labels:
        app: nginx-rollout
    spec:
      containers:
      - name: nginx
        image: nginx:1.21
        ports:
        - containerPort: 80
        resources:
          limits:
            cpu: 200m
            memory: 256Mi
          requests:
            cpu: 100m
            memory: 128Mi

  # 金丝雀发布策略
  strategy:
    canary:
      # 流量逐步切换
      steps:
      - setWeight: 20     # 先切20%流量到新版本
      - pause: {}         # 手动暂停，确认无误再放行
      - setWeight: 50
      - pause: {duration: 30s}
      - setWeight: 100
